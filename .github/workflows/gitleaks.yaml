name: Gitleaks Secret Scanning

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned gitleaks CLI release. The gitleaks-action requires a paid
  # GITLEAKS_LICENSE for organization accounts; the CLI (MIT) does not, so we run
  # the version-pinned binary directly and keep secret scanning license-free.
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for secrets (gitleaks CLI)
        run: bash .github/scripts/gitleaks-scan.sh
