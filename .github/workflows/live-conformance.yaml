name: Live conformance

# Tier-2 live conformance (adapter-brief item 5): install a pinned agent CLI, run
# a canned session, and assert the REAL pre-tool payload it emits still parses
# through the adapter — the check that catches silent fixture rot against the
# actual agent, not a hand-authored snapshot.
#
# workflow_dispatch ONLY. It needs provider secrets and a nondeterministic model
# turn, so a maintainer runs it deliberately; it is never a PR gate and never
# auto-runs. capture.mjs skips any agent whose secret is unset, so a run with no
# secrets configured no-ops cleanly rather than failing. The deterministic halves
# (hook-config generation, payload assertion) are gated on every PR by the normal
# Node tests (test/live-capture.test.mjs). See docs/live-conformance.md.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        agent: [claude, codex, amp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Capture and verify the real pre-tool payload
        env:
          AGENT: ${{ matrix.agent }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: node .github/scripts/live-capture/capture.mjs "$AGENT"
