name: Release canary

# Daily cross-check that the three release surfaces agree: the highest version
# published to npm, the latest v* git tag, and the top dated CHANGELOG.md
# heading. auto-version.yaml keeps them in lockstep on the happy path; a partial
# release failure (published-but-untagged, tag-without-docs) desynchronizes them
# and, left unnoticed, corrupts the next release's commit-range analysis. The
# comparison logic lives in ci-truth-serum's `release-canary` console script —
# this workflow is only schedule + install + invoke wiring.
#
# A mismatch fails this run, and the "Workflow failure notify" workflow (which
# names this workflow in its `workflow_run` list) pushes the ntfy notification.
# Schedule + manual ONLY — the check compares against the moving npm registry
# state, so it must never gate a PR.

on:
  schedule:
    - cron: "41 8 * * *" # daily 08:41 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canary:
    name: Release surfaces agree (npm / git tag / CHANGELOG)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the v* tags the canary compares against are present.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Install the canary tool (ci-truth-serum)
        # Pin to the same ci-truth-serum commit the pre-commit hooks and
        # sync-required-checks use, so every consumer shares one version.
        run: python3 -m pip install --user "ci-truth-serum @ git+https://github.com/alexander-turner/ci-truth-serum@1314a61e16854aa43da3612989c86533a5667b30"

      - name: Compare npm max version, latest v* tag, and CHANGELOG heading
        run: release-canary --package agent-control-plane-core
